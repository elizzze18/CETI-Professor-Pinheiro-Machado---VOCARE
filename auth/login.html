<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Vocare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/mobile.css">
</head>
<body>
  <div class="auth-page" id="app">
    <div class="auth-card animate-fade-in-scale">
      <!-- Logo -->
      <div class="auth-logo">
        <img src="../assets/logo.png" alt="Vocare" class="auth-logo-img">
        <p>Faça login para continuar sua jornada</p>
      </div>

      <!-- Reset password notice -->
      <div id="resetNotice" class="alert alert-success hidden" role="alert" style="margin-bottom:var(--space-4)">
        <span class="alert-icon">✅</span>
        <span>Verifique seu e-mail para redefinir a senha.</span>
      </div>

      <!-- Login Form -->
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email" class="form-label">E-mail</label>
          <div class="input-group">
            <span class="input-icon-left" aria-hidden="true">✉️</span>
            <input
              type="email"
              id="email"
              name="email"
              class="form-control"
              placeholder="seu@email.com"
              autocomplete="email"
              required
              aria-required="true"
            >
          </div>
        </div>

        <div class="form-group">
          <div class="flex justify-between items-center" style="margin-bottom:var(--space-1)">
            <label for="password" class="form-label" style="margin:0">Senha</label>
            <button type="button" id="forgotBtn" class="btn btn-ghost btn-sm" style="padding:2px 0;font-size:var(--text-sm);color:var(--color-secondary)">
              Esqueci a senha
            </button>
          </div>
          <div class="input-group">
            <span class="input-icon-left" aria-hidden="true">🔒</span>
            <input
              type="password"
              id="password"
              name="password"
              class="form-control"
              placeholder="••••••••"
              autocomplete="current-password"
              required
              aria-required="true"
            >
            <button type="button" id="togglePwd" class="input-icon-right" aria-label="Mostrar senha" style="background:none;border:none;cursor:pointer">👁️</button>
          </div>
        </div>

        <div id="loginError" class="alert alert-danger hidden" role="alert" style="margin-bottom:var(--space-4)">
          <span class="alert-icon">⚠️</span>
          <span id="loginErrorMsg"></span>
        </div>

        <button type="submit" id="loginBtn" class="btn btn-primary btn-block btn-lg" style="margin-top:var(--space-2)">
          Entrar
        </button>
      </form>

      <!-- Divider -->
      <div class="divider-or">ou continue com</div>

      <!-- Google -->
      <button id="googleBtn" class="btn btn-outline btn-block" style="border-color:var(--color-border);color:var(--color-text-soft)">
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%234285F4' d='M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z'/%3E%3Cpath fill='%2334A853' d='M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z'/%3E%3Cpath fill='%23FBBC05' d='M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z'/%3E%3Cpath fill='%23EA4335' d='M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z'/%3E%3C/svg%3E" width="18" height="18" alt="" aria-hidden="true">
        Entrar com Google
      </button>

      <!-- Register link -->
      <p class="text-center text-sm mt-6" style="color:var(--color-muted)">
        Não tem conta?
        <a href="register.html" class="font-semi" style="color:var(--color-secondary)">Cadastre-se grátis</a>
      </p>

      <p class="text-center mt-4">
        <a href="../index.html" class="text-muted text-sm">← Voltar ao início</a>
      </p>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="forgotTitle">
      <div class="modal" style="border-radius:var(--radius-2xl)">
        <div class="modal-header">
          <h3 id="forgotTitle">Recuperar senha</h3>
          <button class="modal-close" onclick="closeModal('forgotModal')" aria-label="Fechar">✕</button>
        </div>
        <div class="modal-body">
          <p style="color:var(--color-muted);font-size:var(--text-sm);margin-bottom:var(--space-4)">
            Digite seu e-mail e enviaremos um link para redefinir sua senha.
          </p>
          <div class="form-group">
            <label for="resetEmail" class="form-label">E-mail</label>
            <input type="email" id="resetEmail" class="form-control" placeholder="seu@email.com">
          </div>
          <div id="forgotError" class="alert alert-danger hidden" role="alert">
            <span class="alert-icon">⚠️</span>
            <span id="forgotErrorMsg"></span>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal('forgotModal')">Cancelar</button>
          <button id="resetBtn" class="btn btn-primary">Enviar link</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <script>
  (async () => {
    // Já logado?
    const user = await Auth.init();
    if (user && Auth.profile) { Auth.redirectByRole(); return; }

    // Reset notice
    if (getQueryParam('reset') === 'true') {
      document.getElementById('resetNotice').classList.remove('hidden');
    }

    // Password toggle
    const pwdInput = document.getElementById('password');
    const toggleBtn = document.getElementById('togglePwd');
    toggleBtn.addEventListener('click', () => {
      const isText = pwdInput.type === 'text';
      pwdInput.type = isText ? 'password' : 'text';
      toggleBtn.textContent = isText ? '👁️' : '🙈';
      toggleBtn.setAttribute('aria-label', isText ? 'Mostrar senha' : 'Ocultar senha');
    });

    // Login form
    const form = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const errorBox = document.getElementById('loginError');
    const errorMsg = document.getElementById('loginErrorMsg');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorBox.classList.remove('hidden');
    }
    function hideError() { errorBox.classList.add('hidden'); }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      clearFieldErrors(form);

      const email    = form.querySelector('#email').value.trim();
      const password = form.querySelector('#password').value;

      const errors = validateForm(form, {
        email:    ['required', 'email'],
        password: ['required'],
      });

      if (Object.keys(errors).length) {
        for (const [field, msg] of Object.entries(errors)) {
          showFieldError(field, msg);
        }
        return;
      }

      setButtonLoading(loginBtn, true);
      try {
        await Auth.login(email, password);
        // Auth.init() listener will fire and redirect
        const profile = Auth.profile;
        if (profile) { Auth.redirectByRole(); }
        else {
          // Wait a moment for profile to load
          await new Promise(r => setTimeout(r, 600));
          await Auth.refreshProfile();
          Auth.redirectByRole();
        }
      } catch (err) {
        showError(handleError(err));
        setButtonLoading(loginBtn, false);
      }
    });

    // Google OAuth
    document.getElementById('googleBtn').addEventListener('click', async () => {
      try {
        await Auth.loginWithGoogle();
      } catch (err) {
        showError(handleError(err));
      }
    });

    // Forgot password
    document.getElementById('forgotBtn').addEventListener('click', () => openModal('forgotModal'));

    document.getElementById('forgotModal').addEventListener('click', (e) => closeModalOnOverlay(e, 'forgotModal'));

    document.getElementById('resetBtn').addEventListener('click', async () => {
      const email = document.getElementById('resetEmail').value.trim();
      const errEl = document.getElementById('forgotError');
      const msgEl = document.getElementById('forgotErrorMsg');

      errEl.classList.add('hidden');
      if (!email || !Validate.email(email)) {
        msgEl.textContent = 'Digite um e-mail válido.';
        errEl.classList.remove('hidden');
        return;
      }

      const btn = document.getElementById('resetBtn');
      setButtonLoading(btn, true);
      try {
        await Auth.requestPasswordReset(email);
        closeModal('forgotModal');
        Toast.success('Link de recuperação enviado! Verifique seu e-mail.');
      } catch (err) {
        msgEl.textContent = handleError(err);
        errEl.classList.remove('hidden');
        setButtonLoading(btn, false);
      }
    });
  })();
  </script>
</body>
</html>
