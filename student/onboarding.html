<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Conheça a Voca — Vocare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/mobile.css">
</head>
<body>

  <!-- Full-screen chat layout -->
  <div class="chat-container" id="chatContainer">

    <!-- Header (onboarding-header from mobile.css) -->
    <header class="onboarding-header" id="chatHeader">
      <div class="ai-avatar" aria-hidden="true">🎯</div>
      <div class="onboarding-ai-info">
        <h4>Voca</h4>
        <p>Orientadora de carreira</p>
      </div>
      <!-- Progress dots -->
      <div class="onboarding-progress" id="progressDots" aria-label="Progresso da conversa" style="margin-left:auto;display:flex;gap:6px;align-items:center">
        <span class="progress-dot active" aria-hidden="true"></span>
        <span class="progress-dot" aria-hidden="true"></span>
        <span class="progress-dot" aria-hidden="true"></span>
        <span class="progress-dot" aria-hidden="true"></span>
        <span class="progress-dot" aria-hidden="true"></span>
        <span class="progress-dot" aria-hidden="true"></span>
      </div>
    </header>

    <!-- Chat Body -->
    <main class="chat-body" id="chatBody" role="log" aria-live="polite" aria-label="Conversa com Voca">
      <!-- Messages inserted by JS -->
    </main>

    <!-- Chat Footer -->
    <footer class="chat-footer" id="chatFooter">
      <div class="chat-input-wrap">
        <textarea
          id="chatInput"
          class="chat-input"
          placeholder="Digite sua resposta..."
          rows="1"
          maxlength="1000"
          aria-label="Mensagem para Voca"
          autocomplete="off"
          spellcheck="true"
        ></textarea>
      </div>
      <button
        id="sendBtn"
        class="chat-send-btn"
        aria-label="Enviar mensagem"
        type="button"
        disabled
      >➤</button>
    </footer>

  </div>

  <!-- Profile Creating Overlay -->
  <div id="profileCreatingOverlay" class="loading-overlay hidden" role="status" aria-live="assertive">
    <div class="profile-creating">
      <div class="profile-creating-icon" aria-hidden="true">🧠</div>
      <div class="spinner spinner-lg" aria-hidden="true"></div>
      <h3 style="color:var(--color-primary);font-size:var(--text-xl);font-weight:var(--fw-semi)">Criando seu perfil...</h3>
      <p id="profileCreatingMsg" style="color:var(--color-muted);font-size:var(--text-sm);text-align:center;max-width:280px">
        A Voca está analisando suas respostas para montar seu perfil vocacional personalizado.
      </p>
    </div>
  </div>

  <style>
    /* Progress dots */
    .progress-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transition: background 0.3s ease;
      flex-shrink: 0;
    }
    .progress-dot.active {
      background: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(240,165,0,0.3);
    }
    .progress-dot.done {
      background: rgba(255,255,255,0.85);
    }

    /* Typing indicator wrapper */
    .typing-wrapper {
      display: flex;
      align-items: flex-start;
      gap: var(--space-2);
      animation: fadeIn 200ms var(--ease) both;
    }
    .typing-wrapper .mini-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      flex-shrink: 0;
      border: 2px solid var(--color-accent);
    }
  </style>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ai.js"></script>
  <script src="../js/onboarding.js"></script>
</body>
</html>
