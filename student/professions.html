<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explorar Profissões — Vocare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/mobile.css">
  <style>
    /* ── Page header ── */
    .professions-header {
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
      padding: calc(var(--nav-height) + var(--space-5)) var(--space-4) var(--space-5);
      color: #fff;
    }
    .professions-header h1 {
      color: #fff;
      font-size: var(--text-2xl);
      margin-bottom: var(--space-1);
    }
    .professions-header p {
      color: rgba(255,255,255,0.75);
      font-size: var(--text-sm);
      margin: 0;
    }
    /* search bar in header */
    .professions-search-wrap {
      margin-top: var(--space-4);
    }
    .professions-search-wrap .search-bar {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.3);
    }
    .professions-search-wrap .search-bar input {
      color: #fff;
    }
    .professions-search-wrap .search-bar input::placeholder {
      color: rgba(255,255,255,0.6);
    }
    .professions-search-wrap .search-icon { color: rgba(255,255,255,0.7); }
    .professions-search-wrap .search-bar:focus-within {
      border-color: var(--color-accent);
      background: rgba(255,255,255,0.18);
      box-shadow: 0 0 0 3px rgba(240,165,0,0.25);
    }
    /* filter chips area */
    .professions-filters {
      padding: var(--space-3) var(--space-4) var(--space-2);
      background: var(--color-card);
      border-bottom: 1px solid var(--color-border-light);
      position: sticky;
      top: 0;
      z-index: var(--z-sticky);
    }
    /* grid */
    .professions-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-3);
      padding: var(--space-4);
    }
    @media (min-width: 480px) {
      .professions-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 640px) {
      .professions-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 1024px) {
      .professions-grid { grid-template-columns: repeat(4, 1fr); }
    }
    /* profession card (grid) */
    .profession-grid-card {
      background: var(--color-card);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-xl);
      overflow: hidden;
      cursor: pointer;
      box-shadow: var(--shadow-card);
      transition: transform var(--duration-base) var(--ease), box-shadow var(--duration-base) var(--ease);
    }
    .profession-grid-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
    .profession-grid-card:focus-visible { outline: 2px solid var(--color-secondary); outline-offset: 2px; }
    .profession-grid-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
    }
    .profession-grid-body {
      padding: var(--space-3);
    }
    .profession-grid-name {
      font-weight: var(--fw-semi);
      font-size: var(--text-sm);
      color: var(--color-text);
      margin-bottom: var(--space-1);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 2.6em;
    }
    .profession-grid-area-badge {
      margin-bottom: var(--space-2);
    }
    .profession-grid-footer {
      padding: var(--space-2) var(--space-3) var(--space-3);
    }
    .profession-grid-footer .btn {
      font-size: var(--text-xs);
      padding: 0.3rem 0.75rem;
      min-height: 32px;
      border-radius: var(--radius-md);
    }
    /* Modal overrides */
    .modal-overlay { padding: 0; align-items: flex-end; }
    @media (min-width: 640px) { .modal-overlay { align-items: center; padding: var(--space-4); } }
    .modal {
      max-width: 600px;
      max-height: 92vh;
      border-radius: var(--radius-2xl) var(--radius-2xl) 0 0;
    }
    @media (min-width: 640px) {
      .modal { border-radius: var(--radius-2xl); }
    }
    /* modal profession header */
    .profession-modal-header {
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      padding: var(--space-6) var(--space-5) var(--space-5);
      position: relative;
    }
    .profession-modal-header h2 { color: #fff; font-size: var(--text-2xl); }
    .profession-modal-close {
      position: absolute;
      top: var(--space-4);
      right: var(--space-4);
      width: 36px; height: 36px;
      border-radius: var(--radius-full);
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      font-size: 1.125rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--duration-fast) var(--ease);
    }
    .profession-modal-close:hover { background: rgba(255,255,255,0.35); }
    /* info grid */
    .profession-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
      margin: var(--space-4) 0;
    }
    .profession-info-item {
      background: var(--color-bg);
      border-radius: var(--radius-lg);
      padding: var(--space-3);
    }
    .profession-info-label {
      font-size: var(--text-xs);
      color: var(--color-muted);
      font-weight: var(--fw-medium);
      margin-bottom: var(--space-1);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .profession-info-value {
      font-size: var(--text-sm);
      font-weight: var(--fw-semi);
      color: var(--color-text);
    }
    /* mentor mini-card in modal */
    .modal-mentor-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: background var(--duration-fast) var(--ease);
    }
    .modal-mentor-item:hover { background: var(--color-bg); }
    .modal-mentor-avatar {
      width: 44px; height: 44px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: var(--fw-bold);
      font-size: var(--text-sm);
      color: #fff;
      flex-shrink: 0;
      overflow: hidden;
      background: linear-gradient(135deg, var(--color-secondary), var(--color-primary));
    }
    .modal-mentor-avatar img { width: 100%; height: 100%; object-fit: cover; }
    /* results bar */
    .results-bar {
      padding: var(--space-2) var(--space-4);
      font-size: var(--text-sm);
      color: var(--color-muted);
      background: var(--color-bg);
    }
  </style>
</head>
<body class="">

  <!-- ── Top Nav ── -->
  <nav class="top-nav" role="navigation" aria-label="Navegação principal">
    <a href="dashboard.html" class="nav-brand" aria-label="Vocare início">
      <img src="../assets/logo.png" alt="Vocare" class="nav-logo">
    </a>
        <nav class="nav-menu-desktop" aria-label="Menu principal">
      <a href="dashboard.html" class="btn btn-ghost btn-sm">🏠 Início</a>
      <a href="professions.html" class="btn btn-ghost btn-sm" style="font-weight:600;color:var(--color-primary)">🔍 Explorar</a>
      <a href="mentors.html" class="btn btn-ghost btn-sm">👤 Mentores</a>
      <a href="voca.html" class="btn btn-ghost btn-sm">💬 Chat IA</a>
      <a href="career-plan.html" class="btn btn-ghost btn-sm">📋 Plano</a>
      <a href="test.html" class="btn btn-ghost btn-sm">🎯 Refazer Teste</a>
    </nav>
    <div class="nav-actions">
      <div class="dropdown" style="position:relative">
        <div id="navAvatar" class="nav-avatar" role="button" tabindex="0" aria-label="Menu do usuário" aria-haspopup="true" aria-expanded="false"></div>
        <div id="navDropdown" class="dropdown-menu hidden" role="menu">
          <div style="padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--color-divider)">
            <p id="dropdownName" style="font-weight:var(--fw-semi);font-size:var(--text-sm);color:var(--color-text)"></p>
          </div>
          <button class="dropdown-item" onclick="navigate('dashboard.html')">🏠 Início</button>
          <button class="dropdown-item" onclick="navigate('career-plan.html')">📋 Meu plano</button>
          <div class="dropdown-divider"></div>
          <button id="logoutBtn" class="dropdown-item danger">🚪 Sair</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- ── Header with search ── -->
  <header class="professions-header">
    <h1>Explorar Profissões</h1>
    <p>Descubra carreiras compatíveis com o seu perfil</p>
    <div class="professions-search-wrap">
      <div class="search-bar" role="search">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input
          type="search"
          id="searchInput"
          placeholder="Buscar profissões..."
          autocomplete="off"
          aria-label="Buscar profissões"
        >
        <button id="clearSearch" class="btn-ghost" style="background:none;border:none;color:rgba(255,255,255,0.7);font-size:1rem;cursor:pointer;padding:0 var(--space-1);display:none" aria-label="Limpar busca">✕</button>
      </div>
    </div>
  </header>

  <!-- ── Filters ── -->
  <div class="professions-filters" role="toolbar" aria-label="Filtros de área">
    <div id="filterChips" class="filter-chips">
      <button class="chip active" data-filter="all">Todas</button>
      <button class="chip" data-filter="sort-compat">⭐ Mais compatíveis</button>
      <!-- Dynamic area chips injected by JS -->
    </div>
  </div>

  <!-- ── Results count ── -->
  <div class="results-bar" id="resultsBar" aria-live="polite" aria-atomic="true">
    Carregando...
  </div>

  <!-- ── Profession Grid ── -->
  <main>
    <div id="professionsGrid" class="professions-grid" role="list" aria-label="Lista de profissões">
      <!-- Skeletons -->
      <div class="profession-grid-card skeleton" style="height:220px"></div>
      <div class="profession-grid-card skeleton" style="height:220px"></div>
      <div class="profession-grid-card skeleton" style="height:220px"></div>
      <div class="profession-grid-card skeleton" style="height:220px"></div>
      <div class="profession-grid-card skeleton" style="height:220px"></div>
      <div class="profession-grid-card skeleton" style="height:220px"></div>
    </div>
  </main>

  <!-- ── Profession Detail Modal ── -->
  <div id="professionModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modalProfName">
    <div class="modal" id="professionModalInner">
      <!-- Dynamic content injected by JS -->
    </div>
  </div>

  <!-- ── Bottom Navigation ── -->

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/professions.js"></script>
</body>
</html>
